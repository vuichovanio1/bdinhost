  <rect x="80" y="540" width="420" height="52" rx="12" fill="#1d6b45"/>
  <text x="290" y="574" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff">MOVER Studio</text>
