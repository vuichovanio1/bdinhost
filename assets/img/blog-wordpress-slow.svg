<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">WordPress performance</title>
  <desc id="desc">Illustration comparing slower WordPress stack and faster HTML delivery.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#eff7f2"/>
      <stop offset="100%" stop-color="#dceee2"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <rect x="70" y="110" width="500" height="470" rx="24" fill="#ffffff" stroke="#c8ddce" stroke-width="3"/>
  <rect x="630" y="110" width="500" height="470" rx="24" fill="#ffffff" stroke="#b8d8c2" stroke-width="3"/>

  <text x="110" y="170" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700" fill="#6a7a6f">WordPress</text>
  <text x="680" y="170" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700" fill="#1d6b45">HTML</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#59655d">
    <text x="110" y="235">PHP + MySQL</text>
    <text x="110" y="285">50-200 SQL заявки</text>
    <text x="110" y="335">30+ CSS/JS ресурса</text>
    <text x="110" y="385">3-7 сек зареждане</text>
    <text x="110" y="435">2-5 MB страница</text>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#245f43">
    <text x="680" y="235">Готов статичен файл</text>
    <text x="680" y="285">0 database заявки</text>
    <text x="680" y="335">1-3 HTTP заявки</text>
    <text x="680" y="385">0.3-0.8 сек зареждане</text>
    <text x="680" y="435">30-80 KB страница</text>
  </g>

  <rect x="95" y="495" width="450" height="58" rx="14" fill="#f9d9dd"/>
  <text x="320" y="533" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#a83345">Тежка динамична архитектура</text>

  <rect x="655" y="495" width="450" height="58" rx="14" fill="#d8f3df"/>
  <text x="880" y="533" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#1d6b45">Лек и бърз подход</text>
</svg>
